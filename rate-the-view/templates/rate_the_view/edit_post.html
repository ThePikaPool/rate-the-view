<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>Edit Post</title>
</head>

<body>

<!-- HEADER -->
<div class="w3-container w3-emerald">
    <h1>Rate the View</h1>
</div>

<!-- NAVBAR -->
<div class="w3-bar w3-olive">
    <a href="{% url 'rate_the_view:home' %}" class="w3-bar-item w3-button">Home</a>
    <a href="{% url 'rate_the_view:upload' %}" class="w3-bar-item w3-button">Upload</a>
    <a href="{% url 'rate_the_view:profile' request.user.username %}" class="w3-bar-item w3-button">Profile</a>
    <a href="{% url 'rate_the_view:logout' %}" class="w3-bar-item w3-button">Logout</a>
    <a href="{% url 'rate_the_view:contact_us' %}" class="w3-bar-item w3-button">Contact Us</a>
</div>

<!-- CONTENT -->
<div class="w3-container w3-pale-green w3-padding">
    <h2>Edit Post</h2>

    <form method="post" enctype="multipart/form-data" class="w3-container">

        {% csrf_token %}

        <p>
            <label class="w3-text-olive"><b>Title</b></label>
            <input class="w3-input w3-border" type="text" name="title" value="{{ post.title }}">
        </p>

        <p>
            <label class="w3-text-olive"><b>Location</b></label>
            <input class="w3-input w3-border" type="text" name="location" value="{{ post.location }}">
        </p>

        <p>
            <label class="w3-text-olive"><b>Description</b></label>
            <textarea class="w3-input w3-border" name="description" rows="4">{{ post.description }}</textarea>
        </p>

        <p>
            <label class="w3-text-olive"><b>Replace Image</b></label>
            <input class="w3-input" type="file" name="image">
        </p>

        {% if post.image %}
            <p><b>Current Image:</b></p>
            <img src="{{ post.image.url }}" alt="Current image" width="300" class="w3-margin-bottom">
        {% endif %}

        <button type="submit" class="w3-button w3-green">Save Changes</button>

        <a href="{% url 'rate_the_view:profile' request.user.username %}" 
           class="w3-button w3-light-grey">
           Cancel
        </a>

    </form>
</div>

</body>
</html>
