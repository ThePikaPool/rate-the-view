<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>Rate The View</title>
</head>

<body>

    <div class="w3-container w3-emerald">
        <h1>Views of The Week</h1>
    </div>

    

    <div class="w3-bar w3-olive">

        <a href="{% url 'rate_the_view:home' %}" class="w3-bar-item w3-button">Home</a>
        <a href="{% url 'rate_the_view:upload' %}" class="w3-bar-item w3-button">Upload</a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'rate_the_view:profile' request.user.username %}" class="w3-bar-item w3-button">Profile</a>
            <a href="{% url 'rate_the_view:logout' %}" class="w3-bar-item w3-button">Logout</a>
        {% else %}
            <a href="{% url 'rate_the_view:login' %}" class="w3-bar-item w3-button">Login</a>
        {% endif %}

        <a href="/contact-us" class="w3-bar-item w3-button">Contact Us</a>

    </div>








</html>
