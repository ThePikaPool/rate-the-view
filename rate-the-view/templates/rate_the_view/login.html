<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>Login - Rate the View</title>
</head>

<body>

<div class="w3-container w3-emerald">
<h1>Rate the View</h1>
</div>

<div class="w3-bar w3-olive">

    <a href="{% url 'rate_the_view:home' %}"class="w3-bar-item w3-button">Home</a>
    <a href="{% url 'rate_the_view:login' %}"class="w3-bar-item w3-button">Login</a>

</div>

<div class="w3-container w3-pale-green">
<h2>Login</h2>
</div>

{% if error %}
    <p>{{ error }}</p>
{% endif %}

<div class="w3-container w3-olive w3-padding-32">

<form method="post">
    {% csrf_token %}

    <label for="username">Username</label><br>
    <input type="text" id="username" name="username" placeholder="Enter username..."><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" placeholder="Enter password..."><br><br>

    <button type="submit">Log in</button>
</form>

</div>

<div class="w3-container w3-pale-green">
<p><a href="#">Create account</a></p>
</div>

</body>
</html>
